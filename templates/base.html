<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PyKeyBox{% endblock %}</title>
  <style>
    :root { --bg:#f5f6f8; --card:#fff; --border:#dde1e6; --accent:#2d6cdf; --danger:#d9534f; --muted:#6b7280; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:#1f2329; }
    header { background:var(--card); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:56px; }
    header a.brand { font-weight:700; font-size:18px; color:#1f2329; text-decoration:none; }
    header nav a { color:var(--accent); text-decoration:none; margin-left:16px; font-size:14px; }
    main { max-width:760px; margin:24px auto; padding:0 20px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:16px; }
    .flash { background:#fff4e5; border:1px solid #ffd591; color:#8a5a00; padding:10px 14px; border-radius:8px; margin-bottom:16px; }
    input[type=text], input[type=password], textarea { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; }
    textarea { min-height:200px; resize:vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 6px; }
    button, .btn { display:inline-block; border:none; border-radius:8px; padding:9px 16px; font-size:14px; cursor:pointer; text-decoration:none; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-secondary { background:#eef0f3; color:#1f2329; }
    .btn-danger { background:var(--danger); color:#fff; }
    .actions { display:flex; gap:8px; align-items:center; margin-top:16px; }
    ul.keys { list-style:none; margin:0; padding:0; }
    ul.keys li { display:flex; justify-content:space-between; align-items:center; padding:12px 4px; border-bottom:1px solid var(--border); }
    ul.keys li:last-child { border-bottom:none; }
    ul.keys a.title { color:var(--accent); text-decoration:none; font-weight:600; font-size:15px; }
    .time { color:var(--muted); font-size:12px; }
    pre.content { background:#0f172a; color:#e2e8f0; padding:16px; border-radius:8px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
    .search { display:flex; gap:8px; margin-bottom:16px; }
    .search input { flex:1; }
    .empty { color:var(--muted); text-align:center; padding:24px; }
  </style>
</head>
<body>
  {% if session.get('sid') %}
  <header>
    <a class="brand" href="{{ url_for('index') }}">🔐 PyKeyBox</a>
    <nav>
      <a href="{{ url_for('add') }}">+ Add</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
  </header>
  {% endif %}
  <main>
    {% with messages = get_flashed_messages() %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
